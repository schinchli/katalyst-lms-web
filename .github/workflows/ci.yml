name: CI — Tests, Type Check & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, 'feature/**']

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 0: Security Gate — must pass before any other job
  # Runs security-gate.sh --ci (all checks except Next.js build)
  # Blocks the entire pipeline if secrets, XSS, missing rate limits,
  # missing RLS, weak passwords, or bad headers are detected.
  # ────────────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm install --legacy-peer-deps

      - name: Run security gate (CI mode)
        run: bash scripts/security-gate.sh --ci

  # ────────────────────────────────────────────────────────────────────
  # Job 1: Backend Lambda Tests (Jest + coverage)
  # ────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Jest Tests
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Web App — Type Check + Lint
  # ────────────────────────────────────────────────────────────────────
  web-type-check:
    name: Web — TypeScript Check
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # Job 3: Web App — Next.js Build
  # ────────────────────────────────────────────────────────────────────
  web-build:
    name: Web — Next.js Build
    runs-on: ubuntu-latest
    needs: web-type-check
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build Next.js app
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ────────────────────────────────────────────────────────────────────
  # Job 4: Mobile — Type Check
  # ────────────────────────────────────────────────────────────────────
  mobile-type-check:
    name: Mobile — TypeScript Check
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # Summary gate — all jobs must pass for PR to merge
  # ────────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [security-gate, backend-tests, web-type-check, web-build, mobile-type-check]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.security-gate.result }}" != "success" ]]; then
            echo "BLOCKED: Security gate failed — secrets, XSS, or security headers issue detected."
            exit 1
          fi
          if [[ "${{ needs.web-type-check.result }}" != "success" ]]; then
            echo "BLOCKED: TypeScript errors in web app."
            exit 1
          fi
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "BLOCKED: Backend test suite failed."
            exit 1
          fi
          if [[ "${{ needs.web-build.result }}" != "success" ]]; then
            echo "BLOCKED: Next.js production build failed."
            exit 1
          fi
          echo "✅ All CI checks passed — safe to merge and deploy."
