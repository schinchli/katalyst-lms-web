name: CI — Tests, Type Check & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, 'feature/**']

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 0: Security Gate — must pass before any other job
  # Runs security-gate.sh --ci (all checks except Next.js build)
  # Blocks the entire pipeline if secrets, XSS, missing rate limits,
  # missing RLS, weak passwords, or bad headers are detected.
  # ────────────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm install --legacy-peer-deps

      - name: Run security gate (CI mode)
        run: bash scripts/security-gate.sh --ci

  # ────────────────────────────────────────────────────────────────────
  # Job 1: Backend Lambda Tests (Jest + coverage)
  # ────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Jest Tests
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Web App — Type Check + Lint
  # ────────────────────────────────────────────────────────────────────
  web-type-check:
    name: Web — TypeScript Check
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # Job 3: Web App — Next.js Build
  # ────────────────────────────────────────────────────────────────────
  web-build:
    name: Web — Next.js Build
    runs-on: ubuntu-latest
    needs: web-type-check
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build Next.js app
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ────────────────────────────────────────────────────────────────────
  # Job 4: Mobile — Type Check
  # ────────────────────────────────────────────────────────────────────
  mobile-type-check:
    name: Mobile — TypeScript Check
    runs-on: ubuntu-latest
    needs: security-gate
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # Job 5: Playwright E2E Tests
  #
  # Runs the full Playwright suite including:
  #   - 01-auth (unauthenticated flows)
  #   - 05-security-headers
  #   - 11-flashcards (all 29 cases — requires TEST_EMAIL + TEST_PASSWORD)
  #   - all other specs
  #
  # Requires these GitHub Actions secrets to be configured:
  #   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
  #   NEXT_PUBLIC_RECAPTCHA_SITE_KEY, ADMIN_EMAILS,
  #   TEST_EMAIL (= test@katalyst.dev), TEST_PASSWORD
  #
  # Auth-gated tests (flashcards, dashboard, quiz) skip gracefully
  # when TEST_EMAIL / TEST_PASSWORD are absent — they never block CI.
  # ────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [web-build]          # only run after build passes
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          CI: 'true'
          # Supabase + app config (set these as GitHub Actions secrets)
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:      ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAILS:                   ${{ secrets.ADMIN_EMAILS }}
          RECAPTCHA_SECRET_KEY:           ${{ secrets.RECAPTCHA_SECRET_KEY }}
          # Test credentials — auth-gated tests skip gracefully if absent
          TEST_EMAIL:    ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/e2e-report/
          retention-days: 14

      - name: Upload failure traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Summary gate — all jobs must pass for PR to merge
  # ────────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [security-gate, backend-tests, web-type-check, web-build, mobile-type-check, e2e-tests]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.security-gate.result }}" != "success" ]]; then
            echo "BLOCKED: Security gate failed — secrets, XSS, or security headers issue detected."
            exit 1
          fi
          if [[ "${{ needs.web-type-check.result }}" != "success" ]]; then
            echo "BLOCKED: TypeScript errors in web app."
            exit 1
          fi
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "BLOCKED: Backend test suite failed."
            exit 1
          fi
          if [[ "${{ needs.web-build.result }}" != "success" ]]; then
            echo "BLOCKED: Next.js production build failed."
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "BLOCKED: Playwright E2E tests failed."
            exit 1
          fi
          echo "✅ All CI checks passed — safe to merge and deploy."
