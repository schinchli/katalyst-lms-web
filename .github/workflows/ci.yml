name: CI — Tests, Type Check & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, 'feature/**']

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1: Backend Lambda Tests (Jest + coverage)
  # ────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Jest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Web App — Type Check + Lint
  # ────────────────────────────────────────────────────────────────────
  web-type-check:
    name: Web — TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # Job 3: Web App — Next.js Build
  # ────────────────────────────────────────────────────────────────────
  web-build:
    name: Web — Next.js Build
    runs-on: ubuntu-latest
    needs: web-type-check
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build Next.js app
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ────────────────────────────────────────────────────────────────────
  # Job 4: Mobile — Type Check
  # ────────────────────────────────────────────────────────────────────
  mobile-type-check:
    name: Mobile — TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # Summary gate — all jobs must pass for PR to merge
  # ────────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [backend-tests, web-type-check, web-build, mobile-type-check]
    steps:
      - run: echo "All CI checks passed ✓"
