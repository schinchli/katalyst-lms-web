name: CDK Deploy

on:
  push:
    branches:
      - main     # → deploy to production
      - develop  # → deploy to staging (dry run only)
    paths:
      - 'infrastructure/**'
      - 'backend/**'
  pull_request:
    paths:
      - 'infrastructure/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/cdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Install CDK deps
        run: npm ci

      - name: Install backend deps
        run: cd ../../backend && npm ci

      - name: Run CDK tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infrastructure/cdk
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci && cd ../../backend && npm ci

      - name: CDK diff (show changes)
        run: npx cdk diff

      - name: CDK deploy
        run: npx cdk deploy --require-approval never --all
