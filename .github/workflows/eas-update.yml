name: EAS Update (OTA)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/app/**'
      - 'mobile/components/**'
      - 'mobile/hooks/**'
      - 'mobile/stores/**'
      - 'mobile/data/**'
      - 'mobile/constants/**'
      - 'mobile/global.css'
      - 'mobile/tailwind.config.js'
      - 'packages/theme/**'

jobs:
  update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=mobile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production channel
        run: |
          eas update \
            --channel production \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL:         ${{ secrets.PROD_API_URL }}
          EXPO_PUBLIC_CLOUDFRONT_URL:  ${{ secrets.PROD_CLOUDFRONT_URL }}
          EXPO_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          EXPO_PUBLIC_COGNITO_CLIENT_ID:    ${{ secrets.COGNITO_CLIENT_ID }}
