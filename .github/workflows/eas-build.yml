name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'packages/theme/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --workspace=mobile
      - run: npx tsc --noEmit
        working-directory: mobile

  build:
    name: EAS Build (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=mobile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (iOS + Android)
        if: ${{ github.event.inputs.platform == 'all' || github.event_name == 'push' }}
        run: eas build --platform all --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive
        working-directory: mobile

      - name: Build (iOS only)
        if: ${{ github.event.inputs.platform == 'ios' }}
        run: eas build --platform ios --profile ${{ github.event.inputs.profile }} --non-interactive
        working-directory: mobile

      - name: Build (Android only)
        if: ${{ github.event.inputs.platform == 'android' }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive
        working-directory: mobile
