name: Type Check + Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  type-check:
    name: TypeScript — mobile
    runs-on: ubuntu-latest
    continue-on-error: true   # mobile is a git submodule; checked out via katalyst-mobile.git CI
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Skip if mobile submodule not available
        run: |
          if [ ! -f mobile/package.json ]; then
            echo "mobile/ submodule not checked out — skipping type check"
            exit 0
          fi
          cd mobile && npm ci --legacy-peer-deps && npx tsc --noEmit
