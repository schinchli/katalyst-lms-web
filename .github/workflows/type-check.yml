name: Type Check + Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  type-check:
    name: TypeScript — ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [mobile, packages/shared-types, packages/theme]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --workspace=${{ matrix.workspace }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.workspace }}
