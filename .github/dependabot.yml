version: 2
updates:
  # ── Web app (Next.js / Vercel) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - web
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # Group all non-breaking updates into one PR
      patch-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── Backend Lambdas ──────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      patch-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── Root monorepo ────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - monorepo

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    labels:
      - dependencies
      - github-actions
